# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Valeurs par défaut uniquement (optionnel) — les vraies valeurs viennent des env DISCORD_* dans .env / .env.local
    discord_guild_id_default: ''
    discord_bot_token_default: ''
    discord_effectif_channel_id_default: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $jwtSecret: '%env(BACKEND_JWT_SECRET)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # Pseudo serveur Discord (nickname) via API Bot (optionnel) — token / guild ID uniquement via .env
    App\Service\DiscordGuildMemberResolver:
        arguments:
            $guildId: '%env(default:discord_guild_id_default:DISCORD_GUILD_ID)%'
            $botToken: '%env(default:discord_bot_token_default:DISCORD_BOT_TOKEN)%'
            $appEnv: '%env(APP_ENV)%'

    App\Controller\Api\DiscordDebugController:
        arguments:
            $guildId: '%env(default:discord_guild_id_default:DISCORD_GUILD_ID)%'
            $appEnv: '%env(APP_ENV)%'

    App\Controller\Api\JwtSecretDebugController:
        arguments:
            $appEnv: '%env(APP_ENV)%'

    App\Controller\Api\DebugHeadersController:
        arguments:
            $appEnv: '%env(APP_ENV)%'

    App\Service\DiscordChannelNotifier:
        arguments:
            $botToken: '%env(default:discord_bot_token_default:DISCORD_BOT_TOKEN)%'
            $appEnv: '%env(APP_ENV)%'

    App\Controller\Api\DiscordEffectifController:
        arguments:
            $effectifChannelId: '%env(default:discord_effectif_channel_id_default:DISCORD_EFFECTIF_CHANNEL_ID)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
