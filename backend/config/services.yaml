# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Valeurs par défaut uniquement (optionnel) — les vraies valeurs viennent des env DISCORD_* dans .env / .env.local
    discord_guild_id_default: ''
    discord_bot_token_default: ''
    discord_effectif_channel_id_default: '1491575814012276948'
    discord_planning_channel_id_default: ''
    discord_recruitment_hierarchy_role_ids:
        - '1478333880925819014'
        - '1478334122404483215'
        - '1478334176695685213'
        - '1478334303619514419'
        - '1478334349072928808'
        - '1482747651668574218'
    discord_sheriff_papier_role_id: '1479909556044697700'
    jwt_claim_empty: ''
    planning_reset_timezone_default: 'Europe/Paris'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $jwtSecret: '%env(BACKEND_JWT_SECRET)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Monolog\RequestIdProcessor:
        tags:
            - { name: monolog.processor }

    # Pseudo serveur Discord (nickname) via API Bot (optionnel) — token / guild ID uniquement via .env
    App\Service\DiscordGuildMemberResolver:
        arguments:
            $guildId: '%env(default:discord_guild_id_default:DISCORD_GUILD_ID)%'
            $botToken: '%env(default:discord_bot_token_default:DISCORD_BOT_TOKEN)%'
            $cache: '@cache.app'
            $logger: '@logger'
            $recruitmentExcludedHierarchyRoleIds: '%discord_recruitment_hierarchy_role_ids%'
            $sheriffPapierRoleId: '%discord_sheriff_papier_role_id%'

    App\Security\DiscordJwtAuthenticator:
        arguments:
            $jwtIssuer: '%env(default:jwt_claim_empty:BACKEND_JWT_ISS)%'
            $jwtAudience: '%env(default:jwt_claim_empty:BACKEND_JWT_AUD)%'

    App\Controller\Api\DiscordDebugController:
        arguments:
            $guildId: '%env(default:discord_guild_id_default:DISCORD_GUILD_ID)%'
            $appEnv: '%env(APP_ENV)%'

    App\Controller\Api\JwtSecretDebugController:
        arguments:
            $appEnv: '%env(APP_ENV)%'

    App\Controller\Api\DebugHeadersController:
        arguments:
            $appEnv: '%env(APP_ENV)%'

    App\Service\DiscordChannelNotifier:
        arguments:
            $botToken: '%env(default:discord_bot_token_default:DISCORD_BOT_TOKEN)%'
            $logger: '@monolog.logger.discord'

    App\Controller\Api\CountyReferenceController:
        arguments:
            $logger: '@monolog.logger.business'

    App\Controller\Api\DiscordEffectifController:
        arguments:
            $effectifChannelId: '%env(default:discord_effectif_channel_id_default:DISCORD_EFFECTIF_CHANNEL_ID)%'

    App\Controller\Api\ServiceRecordController:
        arguments:
            $planningLogChannelId: '%env(default:discord_planning_channel_id_default:DISCORD_PLANNING_CHANNEL_ID)%'
            $planningResetTimezone: '%env(default:planning_reset_timezone_default:PLANNING_RESET_TIMEZONE)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
