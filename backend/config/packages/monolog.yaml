monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - discord
        - auth
        - business

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event", "!discord", "!auth", "!business"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console", "!discord", "!auth", "!business"]
            discord:
                type: stream
                path: "%kernel.logs_dir%/discord.log"
                level: debug
                channels: [discord]
            auth:
                type: stream
                path: "%kernel.logs_dir%/auth.log"
                level: debug
                channels: [auth]
            business:
                type: stream
                path: "%kernel.logs_dir%/business.log"
                level: debug
                channels: [business]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event", "!discord", "!auth", "!business"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            discord:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: [discord]
            auth:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: [auth]
            business:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: [business]

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation", "!discord", "!auth", "!business"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!discord", "!auth", "!business"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            discord:
                type: stream
                path: php://stderr
                level: info
                channels: [discord]
                formatter: monolog.formatter.json
            auth:
                type: stream
                path: php://stderr
                level: info
                channels: [auth]
                formatter: monolog.formatter.json
            business:
                type: stream
                path: php://stderr
                level: info
                channels: [business]
                formatter: monolog.formatter.json
