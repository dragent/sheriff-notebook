## Production Docker Compose (VPS)
#
# - Builds reproducible images (no code bind-mounts)
# - Runs Next.js in production mode (next start)
# - Runs Symfony with APP_ENV=prod
# - Binds frontend/backend to localhost only (Nginx terminates TLS)
#
# Secrets and app config are read from `.env.local` via `env_file` (no need for
# `docker compose --env-file` unless you want Compose to substitute ${VAR} in
# this YAML; only POSTGRES_* defaults below use optional interpolation).
#
# Required in `.env.local`:
#   POSTGRES_PASSWORD, DATABASE_URL (same password), APP_SECRET, CORS_ALLOW_ORIGIN,
#   NEXTAUTH_URL, NEXTAUTH_SECRET, DISCORD_*, BACKEND_JWT_SECRET, etc.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sheriff}
      POSTGRES_USER: ${POSTGRES_USER:-sheriff}
      # POSTGRES_PASSWORD: set in `.env.local` (passed via env_file; do not use ${}? here)
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sheriff} -d ${POSTGRES_DB:-sheriff}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_ENV: prod
    env_file:
      - .env.local
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      # APP_SECRET, DATABASE_URL, CORS_ALLOW_ORIGIN, BACKEND_JWT_SECRET, … from `.env.local`
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      BACKEND_BASE_URL: http://backend
      # NEXTAUTH_URL, NEXTAUTH_SECRET, … from `.env.local`
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode >= 200 && r.statusCode < 300 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  db_data:
