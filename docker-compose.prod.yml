## Production Docker Compose (VPS)
#
# - Builds reproducible images (no code bind-mounts)
# - Runs Next.js in production mode (next start)
# - Runs Symfony with APP_ENV=prod
# - Binds frontend/backend to localhost only (Nginx terminates TLS)
#
# Interpolation (${POSTGRES_PASSWORD}, ${APP_SECRET}, etc.):
#   Docker Compose reads the DEFAULT `.env` file only — not `.env.local`.
#   Either run with an explicit env file (recommended, same as backend/frontend):
#     docker compose --env-file .env.local -f docker-compose.prod.yml up -d --build
#   Or duplicate the needed keys into a root `.env` file.
#
# The Postgres container REQUIRES POSTGRES_PASSWORD (do not remove it). Use the same
# password inside DATABASE_URL for Symfony.
#
# Usage:
#   docker compose --env-file .env.local -f docker-compose.prod.yml up -d --build
#
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sheriff}
      POSTGRES_USER: ${POSTGRES_USER:-sheriff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.local}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sheriff} -d ${POSTGRES_DB:-sheriff}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_ENV: prod
    env_file:
      - .env.local
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET in .env.local}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.local}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:?Set CORS_ALLOW_ORIGIN in .env.local}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:?Set NEXTAUTH_URL in .env.local}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode >= 200 && r.statusCode < 300 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  db_data:

