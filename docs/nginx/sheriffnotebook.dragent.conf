# Nginx reverse proxy — Sheriff's Office Annesburg
# Domains: sheriffnotebook.dragent.fr + api.sheriffnotebook.dragent.fr
#
# Prerequisites:
# 1. Certbot cert obtained (webroot) for both names.
# 2. Copy TLS snippet (webroot often skips creating this file):
#      sudo mkdir -p /etc/letsencrypt
#      sudo cp docs/nginx/letsencrypt-options-ssl-nginx.conf /etc/letsencrypt/options-ssl-nginx.conf
# 3. Optional DH params (else omit ssl_dhparam): sudo openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048

upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:8080;
}

# HTTP → HTTPS (+ ACME)
server {
    listen 80;
    listen [::]:80;
    server_name sheriffnotebook.dragent.fr api.sheriffnotebook.dragent.fr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend HTTPS (`http2 on;` requires nginx >= 1.25.1; older: use `listen 443 ssl http2;` instead)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sheriffnotebook.dragent.fr;

    ssl_certificate     /etc/letsencrypt/live/sheriffnotebook.dragent.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sheriffnotebook.dragent.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# Backend HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.sheriffnotebook.dragent.fr;

    ssl_certificate     /etc/letsencrypt/live/sheriffnotebook.dragent.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sheriffnotebook.dragent.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
