# Nginx reverse proxy for Sheriff's Office Annesburg
# Domain: sheriffnotebook.dragent (frontend) + api.sheriffnotebook.dragent (backend)
# Place in /etc/nginx/sites-available/ then symlink to sites-enabled.
# SSL: run Certbot first, see docs/nginx/README.md

# Upstreams (Docker Compose prod: frontend=3000, backend=8080)
upstream frontend {
    server 127.0.0.1:3000;
}

upstream backend {
    server 127.0.0.1:8080;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sheriffnotebook.dragent api.sheriffnotebook.dragent;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend — sheriffnotebook.dragent
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sheriffnotebook.dragent;

    ssl_certificate     /etc/letsencrypt/live/sheriffnotebook.dragent/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sheriffnotebook.dragent/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# Backend API — api.sheriffnotebook.dragent
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sheriffnotebook.dragent;

    ssl_certificate     /etc/letsencrypt/live/sheriffnotebook.dragent/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sheriffnotebook.dragent/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

