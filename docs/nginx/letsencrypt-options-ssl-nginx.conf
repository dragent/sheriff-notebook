# TLS parameters compatible with Certbot / Mozilla intermediate (Aug-2023 baseline).
# Certbot's "webroot" mode does not always create /etc/letsencrypt/options-ssl-nginx.conf —
# copy this file there before enabling the full HTTPS vhost:
#   sudo mkdir -p /etc/letsencrypt
#   sudo cp docs/nginx/letsencrypt-options-ssl-nginx.conf /etc/letsencrypt/options-ssl-nginx.conf
#
# After editing, run: sudo certbot renew --dry-run

ssl_session_cache shared:le_nginx_SSL:10m;
ssl_session_timeout 1440m;
ssl_session_tickets off;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
